<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>줍줍 - 문장 이미지 랜덤 아카이브</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">JUPJUP</p>
      <h1>줍줍</h1>
      <p class="desc">Pinterest에서 발견한 글귀 이미지를 그대로 모으고, 랜덤으로 다시 보는 앱 뼈대입니다.</p>
    </div>
  </header>

  <main class="wrap">
    <section class="panel collect-panel">
      <div>
        <h2>이미지 수집 시작</h2>
        <p>현재는 프론트 뼈대입니다. 실제 수집은 서버의 Playwright API에 연결하면 됩니다.</p>
      </div>
      <div class="collect-row">
        <input id="pinUrl" type="url" value="https://kr.pinterest.com/pin/721772277803769239/" placeholder="Pinterest URL 입력" />
        <button id="mockCollectBtn">샘플 이미지 불러오기</button>
      </div>
    </section>

    <section class="panel random-panel">
      <div class="section-head">
        <div>
          <p class="tag">RANDOM IMAGE</p>
          <h2>랜덤 글귀 이미지</h2>
        </div>
        <button id="randomBtn">다음 이미지</button>
      </div>
      <figure class="random-card">
        <img id="randomImage" src="" alt="랜덤 글귀 이미지" />
      </figure>
      <details class="ocr-box">
        <summary>OCR 텍스트 보기</summary>
        <p id="randomOcr"></p>
      </details>
    </section>

    <section class="panel feed-panel">
      <div class="section-head">
        <div>
          <p class="tag">COLLECTED</p>
          <h2>수집된 이미지</h2>
        </div>
        <select id="categoryFilter">
          <option value="all">전체</option>
          <option value="인생">인생</option>
          <option value="관계">관계</option>
          <option value="철학">철학</option>
          <option value="위로">위로</option>
        </select>
      </div>
      <div id="imageGrid" class="masonry"></div>
    </section>
  </main>

  <dialog id="imageDialog">
    <button id="closeDialog" class="close-btn">×</button>
    <img id="dialogImage" src="" alt="확대 이미지" />
    <p id="dialogText"></p>
  </dialog>

  <script src="./script.js"></script>
</body>
</html>
